name: Release

on:
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

jobs:
  # Create GitHub release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            # Extract changelog for current version
            awk "/^## \[$(echo ${{ steps.get_version.outputs.version }})\]/,/^## \[/{if(/^## \[/ && NR>1) exit; print}" CHANGELOG.md > current_changelog.md
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            cat current_changelog.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog=No changelog available" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Changes in ${{ steps.get_version.outputs.version }}
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            
            ### Backend
            ```bash
            docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.get_version.outputs.version }}
            ```
            
            ### Frontend
            ```bash
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ steps.get_version.outputs.version }}
            ```
            
            ### From Source
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd Htx_project_attemp_101
            git checkout v${{ steps.get_version.outputs.version }}
            ```
            
            See [DEVELOPMENT.md](docs/DEVELOPMENT.md) for setup instructions.
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

  # Build and publish Docker images
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    needs: create-release
    
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Build Python package
  build-python-package:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: create-release
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Create setup.py
        run: |
          cat > setup.py << 'EOF'
          from setuptools import setup, find_packages
          import os
          
          # Read version from tag
          version = os.environ.get('GITHUB_REF_NAME', '0.0.0').lstrip('v')
          
          # Read requirements
          with open('requirements.txt') as f:
              requirements = [line.strip() for line in f if line.strip() and not line.startswith('#')]
          
          setup(
              name="htx-trading-analytics",
              version=version,
              author="HTX Project Team",
              description="Trading analytics platform for HTX exchange",
              long_description=open('../README.md').read(),
              long_description_content_type="text/markdown",
              url="https://github.com/${{ github.repository }}",
              packages=find_packages(),
              classifiers=[
                  "Development Status :: 4 - Beta",
                  "Intended Audience :: Financial and Insurance Industry",
                  "License :: OSI Approved :: MIT License",
                  "Programming Language :: Python :: 3",
                  "Programming Language :: Python :: 3.8",
                  "Programming Language :: Python :: 3.9",
                  "Programming Language :: Python :: 3.10",
                  "Programming Language :: Python :: 3.11",
              ],
              python_requires=">=3.8",
              install_requires=requirements,
              entry_points={
                  "console_scripts": [
                      "htx-analytics=app.main:main",
                  ],
              },
          )
          EOF

      - name: Build package
        env:
          GITHUB_REF_NAME: ${{ needs.create-release.outputs.version }}
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload wheel to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./backend/dist/htx_trading_analytics-${{ needs.create-release.outputs.version }}-py3-none-any.whl
          asset_name: htx_trading_analytics-${{ needs.create-release.outputs.version }}-py3-none-any.whl
          asset_content_type: application/octet-stream

      - name: Upload source to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./backend/dist/htx-trading-analytics-${{ needs.create-release.outputs.version }}.tar.gz
          asset_name: htx-trading-analytics-${{ needs.create-release.outputs.version }}.tar.gz
          asset_content_type: application/gzip

  # Deploy to staging (if enabled)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [create-release, build-and-publish]
    if: github.repository == 'Kaushator/Htx_project_attemp_101' && !contains(needs.create-release.outputs.version, '-')
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying version ${{ needs.create-release.outputs.version }} to staging"
          # Add actual deployment commands here
          # Example: kubectl set image deployment/htx-backend htx-backend=ghcr.io/${{ github.repository }}/backend:${{ needs.create-release.outputs.version }}

  # Security scan for release
  security-scan-release:
    name: Security Scan Release
    runs-on: ubuntu-latest
    needs: [create-release, build-and-publish]

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.component }}:${{ needs.create-release.outputs.version }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.component }}.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.component }}.sarif'

  # Notify on release completion
  notify:
    name: Notify Release Completion
    runs-on: ubuntu-latest
    needs: [create-release, build-and-publish, build-python-package]
    if: always()

    steps:
      - name: Notify success
        if: needs.build-and-publish.result == 'success' && needs.build-python-package.result == 'success'
        run: |
          echo "✅ Release ${{ needs.create-release.outputs.version }} completed successfully!"
          echo "📦 Docker images published to ghcr.io"
          echo "🐍 Python package built and attached to release"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.create-release.outputs.version }}"

      - name: Notify failure
        if: needs.build-and-publish.result == 'failure' || needs.build-python-package.result == 'failure'
        run: |
          echo "❌ Release ${{ needs.create-release.outputs.version }} failed!"
          echo "Check the workflow logs for details."
          exit 1