# HTX Trading Platform - Production Docker Compose Override
services:
  api:
    restart: always
    environment:
      - ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://htx:htx_secure_password@db:5432/htx
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Enable PostgreSQL for production
  db:
    image: postgres:16-alpine
    container_name: htx-postgres
    environment:
      POSTGRES_DB: htx
      POSTGRES_USER: htx
      POSTGRES_PASSWORD: htx_secure_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - htx-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U htx"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  frontend:
    restart: always
    environment:
      - VITE_API_URL=https://api.yourdomain.com
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Enable Nginx for production
  nginx:
    image: nginx:alpine
    container_name: htx-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - htx-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: htx-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - htx-network
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: htx-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_password_change_me
    networks:
      - htx-network
    restart: always
    depends_on:
      - prometheus

volumes:
  pgdata:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  htx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16