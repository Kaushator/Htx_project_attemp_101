[tool.pyright]
include = ["backend"]
extraPaths = ["backend"]
pythonVersion = "3.12"
pythonPlatform = "Windows"

[tool.pylsp-mypy]
enabled = true
live_mode = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "A", "C4", "ICN", "PIE", "T20", "PYI", "PT", "Q", "RSE", "RET", "SIM", "ARG", "ERA", "PGH", "PL", "TRY", "PERF", "RUF"]
ignore = ["E501", "B008", "B904"]

[tool.black]
line-length = 100
target-version = ["py312"]