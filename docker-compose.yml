version: "3.9"
services:
  api:
    build: ./backend
    env_file: ./backend/.env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

